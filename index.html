<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JamboRide Beta Access</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #2c3e50; margin-bottom: 0.5rem; }
        .status { font-size: 1.2rem; color: #27ae60; font-weight: bold; }
        .time-box {
            margin: 20px 0;
            padding: 15px;
            background: #ecf0f1;
            border-radius: 8px;
            font-size: 1.1rem;
        }
        .test-button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }
        .test-button:hover { 
            background: #219150;
            transform: scale(1.05); 
        }
        footer { margin-top: 30px; font-size: 0.9rem; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>JamboRide</h1>
    <p class="status">Development Update: Ready</p>
    
    <p>The JamboRide apps will be finished this <strong>Saturday</strong> and not today.</p>

    <div class="time-box">
        Current System Time:<br>
        <span id="clock"></span>
    </div>

    <button class="test-button" onclick="revealJoke()">Click to test the app</button>

    <div id="april-fool" style="display:none; margin-top: 25px; border: 2px dashed #e74c3c; padding: 15px; border-radius: 10px;">
        <h2 style="color: #e74c3c;">APRIL FOOLS! 🤡</h2>
        <p>Got you! Just finishing up some final touches.</p>
    </div>

    <footer>
        Posted by: <strong>Kelvin Kachalla</strong>
    </footer>
</div>

<script>
    // Update the clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Reveal the joke and fire confetti
    function revealJoke() {
        document.getElementById('april-fool').style.display = 'block';
        
        // Confetti burst
        var duration = 3 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
          return Math.random() * (max - min) + min;
        }

        var interval = setInterval(function() {
          var timeLeft = animationEnd - Date.now();

          if (timeLeft <= 0) {
            return clearInterval(interval);
          }

          var particleCount = 50 * (timeLeft / duration);
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }
</script>

</body>
</html>
